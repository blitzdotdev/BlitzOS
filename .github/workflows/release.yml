# CI/CD (docs/prod-ci.md): every push to these branches builds the mac app and publishes it as a
# GitHub (pre)release. The in-app updater (src/main/update.ts) polls releases and offers the swap.
# Version = 0.0.1-<run_number> (monotonic, stamped into the bundle, compared against the tag).
#
# Signing is OPTIONAL: with the four secrets below the artifact is Developer-ID-signed + notarized
# (Gatekeeper-clean); without them it builds unsigned (the updater strips quarantine on swap).
#   MAC_CERT_P12 / MAC_CERT_PASSWORD          base64 .p12 export of "Developer ID Application" + its password
#   APPLE_API_KEY_P8 / APPLE_API_KEY_ID / APPLE_API_ISSUER   App Store Connect API key (.p8 content, key id, issuer)
name: release
on:
  push:
    branches: [master, agent-runtime-moments]
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Stamp version (0.0.1-<run>)
        run: npm version "0.0.1-${{ github.run_number }}" --no-git-tag-version
      - name: Import signing cert (when configured)
        if: ${{ secrets.MAC_CERT_P12 != '' }}
        env:
          P12: ${{ secrets.MAC_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          KC=$RUNNER_TEMP/build.keychain
          security create-keychain -p ci "$KC"
          security default-keychain -s "$KC"
          security unlock-keychain -p ci "$KC"
          echo "$P12" | base64 -d > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KC" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci "$KC"
      - name: Notarization key (when configured)
        if: ${{ secrets.APPLE_API_KEY_P8 != '' }}
        run: |
          echo "${{ secrets.APPLE_API_KEY_P8 }}" > $RUNNER_TEMP/asc.p8
          echo "APPLE_API_KEY=$RUNNER_TEMP/asc.p8" >> $GITHUB_ENV
          echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}" >> $GITHUB_ENV
          echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}" >> $GITHUB_ENV
      - name: Build app
        run: npm run build
      - name: Package
        env:
          NOSIGN: ${{ secrets.MAC_CERT_P12 == '' }}
        run: |
          ARGS="--mac zip --arm64 --publish never"
          if [ "$NOSIGN" = "true" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          elif [ -n "${APPLE_API_KEY:-}" ]; then
            ARGS="$ARGS -c.mac.notarize=true"
          fi
          npx electron-builder $ARGS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v0.0.1-${{ github.run_number }}"
          gh release create "$TAG" release/*.zip \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "BlitzOS $TAG" \
            --notes "Auto-build of ${{ github.ref_name }} @ ${{ github.sha }}"
