<!doctype html><meta charset="utf-8"><title>Quotes</title>
<!-- Thinking-widget: verbatim words, displayed BIG — a pull-quote card, not a list of boxes.
     No titlebar, no prose. Drive with update_surface{props:{items:[{text,source?}]}}. -->
<style>
  .wrap{padding:16px 18px 12px;height:100%;display:flex;flex-direction:column;box-sizing:border-box;overflow:auto}
  .mark{font:700 30px ui-serif,Georgia,serif;line-height:.6;color:var(--blitz-accent);margin:4px 0 2px}
  .q{margin-bottom:13px}
  .q:last-child{margin-bottom:4px}
  .q .t{font-family:ui-serif,Georgia,serif;font-size:14.5px;line-height:1.5;font-style:italic;letter-spacing:-.005em}
  .q .src{margin-top:5px;font:600 8.5px ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase;color:var(--blitz-text-dim)}
  .wrap.intro .q{animation:in .35s both}
  .wrap.intro .q:nth-child(3){animation-delay:.08s}.wrap.intro .q:nth-child(4){animation-delay:.16s}
  @keyframes in{from{opacity:0;transform:translateY(6px)}}
</style>
<div class="wrap" id="wrap"></div>
<script>
  // props: { items:[{text, source?}] } — shows up to 2 big serif quotes (3 at tall sizes).
  const SAMPLE={items:[
    {text:'A verbatim line, exactly as the subject wrote it.',source:'source'}]}
  let data=SAMPLE, __p=false
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  function render(d){
    const w=document.getElementById('wrap');w.classList.toggle('intro',!__p);__p=true
    // size-adaptive: one clamped quote as the gist (m tile), more as the tile grows / pops out
    const H=window.innerHeight
    const max=H<220?1:H>380?3:2
    const clamp=H<220?'display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden':''
    w.innerHTML='<div class="mark">“</div>'+(d.items||[]).slice(0,max).map(q=>'<div class="q"><div class="t" style="'+clamp+'">'+esc(q.text)+'</div>'+(q.source?'<div class="src">'+esc(q.source)+'</div>':'')+'</div>').join('')
  }
  render(data)
  window.addEventListener('resize',()=>render(data))
  if(window.blitz&&window.blitz.onProps)window.blitz.onProps(p=>{if(p&&p.items){data=p;render(p)}})
</script>
