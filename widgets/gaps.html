<!doctype html><meta charset="utf-8"><title>Gaps</title>
<!-- Thinking-widget: open questions / missing evidence as dashed empty slots — what is NOT
     known yet. Drive with update_surface{props:{items:[{q,hint?,done?}],note?}}. -->
<style>
  .wrap{padding:13px 15px}
  .g{display:flex;gap:11px;align-items:flex-start;border:1.5px dashed var(--blitz-hairline);border-radius:var(--blitz-radius);padding:11px 13px;margin-bottom:9px;background:transparent}
  .g:last-child{margin-bottom:2px}
  .g .mark{flex:0 0 24px;height:24px;border-radius:99px;border:1.5px dashed var(--blitz-text-dim);display:grid;place-items:center;font:600 13px ui-monospace,monospace;color:var(--blitz-text-dim)}
  .g .q{font-size:12.5px;font-weight:600;line-height:1.35;letter-spacing:-.01em}
  .g .h{font-size:11px;color:var(--blitz-text-dim);margin-top:3px;line-height:1.4}
  .g.done{border-style:solid;background:var(--blitz-surface-2)}
  .g.done .mark{border-style:solid;color:var(--blitz-accent);border-color:var(--blitz-accent)}
  .note{font-size:11px;color:var(--blitz-text-dim);margin-top:10px}
  .wrap.intro .g{animation:in .35s both}
  .wrap.intro .g:nth-child(2){animation-delay:.07s}.wrap.intro .g:nth-child(3){animation-delay:.14s}.wrap.intro .g:nth-child(4){animation-delay:.21s}.wrap.intro .g:nth-child(5){animation-delay:.28s}
  @keyframes in{from{opacity:0;transform:translateY(6px)}}
</style>
<blitz-titlebar><span id="hd">Gaps</span></blitz-titlebar>
<div class="wrap" id="wrap"></div>
<script>
  // props: { title?, items:[{q, hint?, done?}], note? } — done flips a slot to "answered".
  const SAMPLE={title:'Gaps',items:[
    {q:'An open question',hint:'why it matters'},
    {q:'Another unknown',hint:'what would answer it'}]}
  let data=SAMPLE, __p=false
  const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
  function render(d){
    document.getElementById('hd').textContent=d.title||'Gaps'
    const w=document.getElementById('wrap');w.classList.toggle('intro',!__p);__p=true
    w.innerHTML=(d.items||[]).map(g=>'<div class="g'+(g.done?' done':'')+'"><div class="mark">'+(g.done?'✓':'?')+'</div><div><div class="q">'+esc(g.q)+'</div>'+(g.hint?'<div class="h">'+esc(g.hint)+'</div>':'')+'</div></div>').join('')
      +(d.note?'<div class="note">'+esc(d.note)+'</div>':'')
  }
  render(data)
  if(window.blitz&&window.blitz.onProps)window.blitz.onProps(p=>{if(p&&p.items){data=p;render(p)}})
</script>
