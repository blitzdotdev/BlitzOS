<!doctype html>
<meta charset="utf-8" />
<title>GitHub repos</title>
<style>
  :root { color-scheme: dark; }
  body {
    font: 13px/1.45 -apple-system, system-ui, sans-serif;
    margin: 0; padding: 12px; color: #e6edf3; background: #0e1116;
  }
  h1 { font-size: 12px; letter-spacing: .04em; text-transform: uppercase; color: #8b949e; margin: 0 0 10px; }
  a.row {
    display: flex; align-items: baseline; gap: 8px; text-decoration: none; color: inherit;
    padding: 8px 10px; border-radius: 10px; border: 1px solid transparent;
  }
  a.row:hover { background: #161b22; border-color: #21262d; }
  .name { font-weight: 600; color: #58a6ff; white-space: nowrap; }
  .desc { color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .badge { font-size: 10px; color: #c9d1d9; background: #21262d; border-radius: 999px; padding: 1px 7px; white-space: nowrap; }
  #status { color: #8b949e; }
  .err { color: #ff7b72; }
</style>
<h1 id="hd">GitHub repos</h1>
<div id="status">Loading your repositories…</div>
<div id="list"></div>
<script>
  function render(items) {
    var status = document.getElementById('status')
    var list = document.getElementById('list')
    if (!items.length) { status.textContent = 'No repositories found.'; return }
    status.style.display = 'none'
    list.innerHTML = items.map(function (it) {
      var badge = it.badge ? '<span class="badge">' + it.badge + '</span>' : ''
      return '<a class="row" href="' + (it.url || '#') + '" target="_blank" rel="noopener">' +
        '<span class="name">' + (it.label || '') + '</span>' +
        '<span class="desc">' + (it.sub || '') + '</span>' + badge + '</a>'
    }).join('')
  }
  window.blitz.ready(function (props) {
    if (props && props.title) document.getElementById('hd').textContent = props.title
    window.blitz.data('github', 'repos').then(function (r) {
      render(r.items || [])
    }).catch(function (e) {
      var status = document.getElementById('status')
      status.className = 'err'
      status.textContent = String((e && e.message) || e)
    })
  })
</script>
